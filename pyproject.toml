[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
markers = [
    "e2e: end-to-end tests — require Ollama (Llama + nomic-embed-text) running locally",
]

[tool.coverage.run]
source = ["app"]
omit = ["tests/*", "app/pipeline/factory.py"]

[tool.coverage.report]
fail_under = 100
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
]
