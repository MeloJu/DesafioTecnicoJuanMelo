services:
  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    volumes:
      - ./data:/app/data
      - ./chroma_db:/app/chroma_db
      - ./results:/app/results
      - ./logs:/app/logs
      - hf_cache:/root/.cache/huggingface
    environment:
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy

volumes:
  ollama_data:
  hf_cache:
